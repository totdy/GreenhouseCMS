networks:
  dev:
services:
  nginx:
    image: nginx:stable-alpine
    ports:
      - "80:80"
    volumes:
      - "./nginx.conf:/etc/nginx/nginx.conf"
    depends_on:
      - backend
      - frontend
    networks:
      - dev
  backend:
    build: 
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite:///data/greenhouse.db
    volumes:
      - greenhouse-data:/app/data
    networks:
      - dev
  frontend:
    build: 
      context: ./frontend
    networks:
      - dev

volumes:
  greenhouse-data: